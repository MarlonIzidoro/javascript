<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Programa com JS</title>
    <style>
        body {
            background-color: aquamarine;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            background-color: rebeccapurple;
            color: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já meu livrei da maldição</p>
    <script>
        window.alert('Olá, pessoal') //Mostra um alerta na tela
        window.confirm('Está gostando de JavaScript:')// tem opção de sim ou não
        window.prompt('Qual é seu nome:')//Aparece um lugar para voce digitar
    </script>
</body>
</html>
