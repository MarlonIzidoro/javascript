<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(29, 253, 179);
        }
        
        div#area {
            background-color: rgb(37, 186, 212);
            color: white;
            border-radius: 5px;
            padding: 10px;
            height: 200px;
            width: 200px;
            text-align: center;
            line-height: 200px;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja..
    </div>

    <script>
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar() {
            a.innerText = 'Clicou!'
            a.style.background = 'green'
        }

        function entrar() {
            a.innerText = 'Entrou!'
            a.style.background = 'rgb(37, 186, 212)'
        }   

        function sair() {
            a.innerText = 'Saiu!'
            a.style.background = 'rgb(37, 186, 212)'
        }
    </script>
</body>
</html>
